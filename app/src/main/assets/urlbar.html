<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  #bar {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
    background: rgba(28, 28, 30, 0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #url-row {
    display: flex;
    align-items: center;
    height: 40px;
    flex: 0 0 auto;
  }

  input#url {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #f2f2f2;
    font-size: 16px;
    padding: 0 8px;
    font-family: inherit;
  }

  input::placeholder { color: #7a7a7a; }

  #tools-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
  }

  #bookmark-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #bookmark-bar::-webkit-scrollbar { display: none; }

  .bm-btn, .tool-btn {
    flex: 0 0 auto;
    padding: 7px 11px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06);
    color: #d8d8d8;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .bm-btn:active, .tool-btn:active { background: rgba(74,144,226,0.25); color: #fff; border-color: #4a90e2; }

  .bm-add {
    color: #4a90e2;
  }

  .tool-btn {
    color: #9fd0ff;
  }

  .tool-btn-danger {
    color: #ff8a8a;
  }
  .tool-btn-danger:active {
    background: rgba(224,74,74,0.25);
    border-color: #e04a4a;
    color: #fff;
  }
</style>
</head>
<body>
  <div id="bar">
    <div id="url-row">
      <input id="url" type="text" placeholder="Enter URL and press Go…" autocomplete="off" spellcheck="false">
    </div>
    <div id="tools-row">
      <div id="bookmark-bar"></div>
      <button class="tool-btn" id="split-row" title="Split this pane vertically (side by side)">Split ⇔</button>
      <button class="tool-btn" id="split-col" title="Split this pane horizontally (top/bottom)">Split ⇕</button>
      <button class="tool-btn tool-btn-danger" id="remove-split" title="Remove this split (closes this pane)">Remove split</button>
    </div>
  </div>

<script>
  // Talks to MainActivity.PopupBridge (see MainActivity.java), the Android
  // equivalent of window.electronAPI from preload-urlbar.js. Every call here
  // maps 1:1 to an ipcRenderer.send/invoke call in the Electron version.
  const input = document.getElementById('url');
  const bookmarkBar = document.getElementById('bookmark-bar');
  let bookmarks = [];

  function renderBookmarks() {
    bookmarkBar.innerHTML = '';

    bookmarks.forEach((bm, idx) => {
      const btn = document.createElement('button');
      btn.className = 'bm-btn';
      btn.textContent = bm.label;
      btn.title = bm.url;

      btn.addEventListener('click', () => {
        window.AndroidPopup.navigateToBookmark(bm.url);
      });

      // Android WebView fires the standard DOM 'contextmenu' event on
      // long-press automatically, same as a desktop right-click - no extra
      // native code needed for this inner (bookmark-chip) menu.
      btn.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showBmContextMenu(e.clientX, e.clientY, idx, bm);
      });

      bookmarkBar.appendChild(btn);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'bm-btn bm-add';
    addBtn.textContent = '＋';
    addBtn.title = 'Add bookmark';
    addBtn.addEventListener('click', addBookmarkFlow);
    bookmarkBar.appendChild(addBtn);
  }

  function addBookmarkFlow() {
    const defaultUrl = input.value.trim();
    const url = window.prompt('Bookmark URL:', defaultUrl || 'https://');
    if (!url || !url.trim()) return;
    let label = window.prompt('Label:', (() => {
      try { return new URL(url.trim()).hostname; } catch (e) { return url.trim(); }
    })());
    if (!label || !label.trim()) label = url.trim();
    window.AndroidPopup.addBookmark(JSON.stringify({ label: label.trim(), url: url.trim() }));
  }

  function showBmContextMenu(x, y, idx, bm) {
    document.querySelectorAll('.bm-ctx-menu').forEach(m => m.remove());

    const menu = document.createElement('div');
    menu.className = 'bm-ctx-menu';
    menu.style.cssText = `position:fixed;left:${x}px;top:${y}px;background:#1c1c1e;
      border:1px solid rgba(255,255,255,0.14);border-radius:8px;z-index:99999;padding:4px;
      display:flex;flex-direction:column;gap:2px;min-width:110px;box-shadow:0 8px 24px rgba(0,0,0,0.5);`;

    const editBtn = document.createElement('button');
    editBtn.textContent = 'Edit';
    editBtn.style.cssText = 'background:transparent;color:#eee;border:none;padding:8px 10px;border-radius:5px;cursor:pointer;text-align:left;font-size:13px;';
    editBtn.addEventListener('click', () => {
      menu.remove();
      const newUrl = window.prompt('Bookmark URL:', bm.url);
      if (newUrl === null || !newUrl.trim()) return;
      const newLabel = window.prompt('Label:', bm.label);
      if (newLabel === null || !newLabel.trim()) return;
      window.AndroidPopup.editBookmark(idx, JSON.stringify({ label: newLabel.trim(), url: newUrl.trim() }));
    });

    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete';
    delBtn.style.cssText = 'background:transparent;color:#ff6b6b;border:none;padding:8px 10px;border-radius:5px;cursor:pointer;text-align:left;font-size:13px;';
    delBtn.addEventListener('click', () => {
      menu.remove();
      window.AndroidPopup.deleteBookmark(idx);
    });

    menu.appendChild(editBtn);
    menu.appendChild(delBtn);
    document.body.appendChild(menu);

    const dismiss = (ev) => {
      if (!menu.contains(ev.target)) {
        menu.remove();
        document.removeEventListener('pointerdown', dismiss);
      }
    };
    setTimeout(() => document.addEventListener('pointerdown', dismiss), 10);
  }

  // Called from MainActivity each time the popup is opened (the equivalent
  // of onReset in preload-urlbar.js / 'reset-and-focus' in main.js).
  window.resetAndFocus = function (bookmarksJson) {
    input.value = '';
    try { bookmarks = JSON.parse(bookmarksJson) || []; } catch (e) { bookmarks = []; }
    renderBookmarks();
    setTimeout(() => input.focus(), 50);
  };

  // Called from MainActivity after add/edit/delete (equivalent of
  // onBookmarksUpdated / 'bookmarks-updated').
  window.onBookmarksUpdated = function (bookmarksJson) {
    try { bookmarks = JSON.parse(bookmarksJson) || []; } catch (e) { bookmarks = []; }
    renderBookmarks();
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (input.value.trim()) window.AndroidPopup.navigate(input.value);
    } else if (e.key === 'Escape') {
      window.AndroidPopup.close();
    }
  });

  document.getElementById('split-row').addEventListener('click', () => {
    window.AndroidPopup.splitPane('row');
  });
  document.getElementById('split-col').addEventListener('click', () => {
    window.AndroidPopup.splitPane('column');
  });
  document.getElementById('remove-split').addEventListener('click', () => {
    window.AndroidPopup.closePane();
  });
</script>
</body>
</html>
